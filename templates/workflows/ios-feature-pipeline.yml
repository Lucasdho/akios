schema_version: "1.0"
workflow:
  id: "ios-feature-pipeline"
  name: "iOS Feature Pipeline"
  version: "1.0.0"
  author: "Lucas Oliveira / iOS-agentic-kit"
  description: "clarify → specify → plan → tasks; constitution enforces Axiom gates"

requires:
  speckit_version: ">=0.8.5"
  integrations:
    any: ["claude"]

inputs:
  spec:
    type: string
    required: true
    prompt: "Paste the spec text or path from idea-to-spec output"
  integration:
    type: string
    default: "auto"
    prompt: "Integration to use ('auto' uses the project's initialized integration)"

steps:
  - id: clarify
    command: speckit.clarify
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.spec }}"

  - id: review-clarifications
    type: gate
    message: "Review clarifications. Approve to continue to specify."
    options: [approve, reject]
    on_reject: abort

  - id: specify
    command: speckit.specify
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.spec }}"

  - id: review-spec
    type: gate
    message: "Review the spec. Approve to continue to plan."
    options: [approve, reject]
    on_reject: abort

  - id: plan
    command: speckit.plan
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.spec }}"

  - id: review-plan
    type: gate
    message: "Review the plan. Verify Constitution Check passed (Axiom gates enforced). Approve to generate tasks."
    options: [approve, reject]
    on_reject: abort

  - id: tasks
    command: speckit.tasks
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.spec }}"
